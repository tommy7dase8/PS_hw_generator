name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # 监听 main 分支的提交

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 已升级

      - name: Inject Secrets into HTML
        run: |
          sed -i 's|{{SUPABASE_URL}}|${{ secrets.SUPABASE_URL }}|g' index.html
          sed -i 's|{{SUPABASE_KEY}}|${{ secrets.SUPABASE_KEY }}|g' index.html
          sed -i 's|{{LLM_API_KEY}}|${{ secrets.LLM_API_KEY }}|g' index.html
          sed -i 's|{{LLM_API_URL}}|${{ secrets.LLM_API_URL }}|g' index.html
          sed -i 's|{{SUPABASE_ANON_KEY}}|${{ secrets.SUPABASE_ANON_KEY }}|g' index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5 # 已升级

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # 已升级，解决你截图中的报错
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # 已升级